name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-ios-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          xcodebuild -version
          pod --version

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Prepare Flutter iOS build files
        run: flutter build ios --config-only --release

      - name: Build unsigned Runner.app with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/ios_derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf build/ios/unsigned/Payload
          mkdir -p build/ios/unsigned/Payload
          cp -R build/ios_derived/Build/Products/Release-iphoneos/Runner.app build/ios/unsigned/Payload/
          cd build/ios/unsigned
          zip -r ios-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/unsigned/ios-unsigned.ipa
          if-no-files-found: error

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios_derived/Build/Products/Release-iphoneos/Runner.app
          if-no-files-found: warn
