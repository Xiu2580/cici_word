name: cici_word
description: "本地背单词APP — 词词不忘"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  flutter_tts: ^4.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/word_lists/elementary_school/
    - assets/word_lists/junior_high/
    - assets/word_lists/senior_high/
